
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: awesome-api
    ports:
      - "8080:8080"
    environment:
      - PORT=:8080
      - DB_DRIVER=${DB_DRIVER:-postgres}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-awesome_password}
      - DB_NAME=${DB_NAME:-awesome_db}
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
    volumes:
      - ./data:/root/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - awesome-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: awesome-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-awesome_password}
      POSTGRES_DB: ${DB_NAME:-awesome_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - awesome-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  awesome-network:
    driver: bridge

